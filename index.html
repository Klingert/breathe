<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atem-Timer-Schnittstelle</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

<div class="container">
    <div class="input-row">
        <div class="input-group">
            <label for="einatmen">Einatmen (Sek):</label>
            <input type="number" id="einatmen" class="number-input" min="0">
        </div>

        <div class="input-group">
            <label for="halten1">Halten (Sek):</label>
            <input type="number" id="halten1" class="number-input" min="0">
        </div>

        <div class="input-group">
            <label for="ausatmen">Ausatmen (Sek):</label>
            <input type="number" id="ausatmen" class="number-input" min="0">
        </div>

        <div class="input-group">
            <label for="halten2">Halten (Sek):</label>
            <input type="number" id="halten2" class="number-input" min="0">
        </div>
    </div>

    <div class="input-group">
        <label for="gesamtzeit">Gesamtzeit (Min):</label>
        <input type="number" id="gesamtzeit" class="number-input" min="0">
    </div>

    <button class="play-button" aria-label="Starten">
        <svg viewBox="0 0 100 100">
            <polyline points="20,10 80,50 20,90" />
        </svg>
    </button>
</div>

</body>
</html>
