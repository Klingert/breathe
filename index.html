<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>breathe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

<div class="container">
    <div id="timer-display">
        <svg id="circle-progress" viewBox="0 0 100 100" width="300" height="300">
            <circle class="circle-bg" cx="50" cy="50" r="35" />
            <circle id="circle-einatmen" class="circle-segment" cx="50" cy="50" r="35" data-phase="einatmen" />
            <circle id="circle-halten1" class="circle-segment" cx="50" cy="50" r="35" data-phase="halten1" />
            <circle id="circle-ausatmen" class="circle-segment" cx="50" cy="50" r="35" data-phase="ausatmen" />
            <circle id="circle-halten2" class="circle-segment" cx="50" cy="50" r="35" data-phase="halten2" />
            <text id="label-einatmen" class="circle-label" text-anchor="middle">Einatmen</text>
            <text id="label-halten1" class="circle-label" text-anchor="middle">Halten</text>
            <text id="label-ausatmen" class="circle-label" text-anchor="middle">Ausatmen</text>
            <text id="label-halten2" class="circle-label" text-anchor="middle">Halten</text>
            <circle id="circle-indicator" cx="50" cy="5" r="3" fill="black" />
        </svg>
        <div class="timer-footer">
            <span id="elapsed-time">00:00</span>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <span id="total-time">00:00</span>
        </div>
    </div>

    <div class="input-row" id="input-section">
        <div class="input-group">
            <label for="einatmen">Einatmen (Sek):</label>
            <input type="number" id="einatmen" class="number-input" min="0">
        </div>

        <div class="input-group">
            <label for="halten1">Halten (Sek):</label>
            <input type="number" id="halten1" class="number-input" min="0">
        </div>

        <div class="input-group">
            <label for="ausatmen">Ausatmen (Sek):</label>
            <input type="number" id="ausatmen" class="number-input" min="0">
        </div>

        <div class="input-group">
            <label for="halten2">Halten (Sek):</label>
            <input type="number" id="halten2" class="number-input" min="0">
        </div>
    </div>

    <div class="input-group" id="gesamtzeit-group">
        <label for="gesamtzeit">Gesamtzeit (Min):</label>
        <input type="number" id="gesamtzeit" class="number-input" min="0" step="0.1">
    </div>

    <button class="play-button" id="play-button" aria-label="Starten">
        <svg viewBox="0 0 100 100">
            <polyline points="20,10 80,50 20,90" />
        </svg>
    </button>
</div>

</body>
</html>
